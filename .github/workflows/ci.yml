name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Tests Rust ──────────────────────────────────────────────────
  test-rust:
    name: Tests Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libssl-dev pkg-config libavahi-compat-libdnssd-dev

      - name: cargo check
        run: cargo check --workspace

      - name: cargo test (core + sync + proxy + daemon)
        run: cargo test -p core -p sync -p proxy -p daemon --lib 2>&1

  # ─── Tests frontend ─────────────────────────────────────────────
  test-frontend:
    name: Tests frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tauri-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npx vitest run

  # ─── Build release ───────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: test-rust
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/
            target/
          key: ${{ runner.os }}-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libssl-dev pkg-config libavahi-compat-libdnssd-dev libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        working-directory: tauri-app
        run: npm ci

      - name: Build daemon
        run: cargo build -p daemon --release --target ${{ matrix.target }}

      - name: Build Tauri app
        working-directory: tauri-app
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ai-manager-${{ matrix.target }}
          path: |
            tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ai-manager-${{ matrix.target }}
          path: |
            tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ai-manager-${{ matrix.target }}
          path: |
            tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
